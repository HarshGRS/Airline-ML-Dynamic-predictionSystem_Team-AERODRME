services:
  - type: web
    name: airline-pricing-api
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python -m alembic upgrade head"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ENV
        value: production
